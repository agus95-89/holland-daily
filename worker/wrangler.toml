name = "hd-subscribe"
main = "src/index.js"
compatibility_date = "2025-01-01"

# Non-secret config (set via wrangler.toml)
[vars]
# Comma-separated list of origins allowed to POST /. Includes the legacy
# GitHub Pages subscribe page and the current harro-life-site.pages.dev,
# plus the future news.harrojp.com custom domain.
ALLOWED_ORIGIN = "https://agus95-89.github.io,https://harro-life-site.pages.dev,https://news.harrojp.com"
EMAIL_FROM = "onboarding@resend.dev"
GH_DISPATCH_OWNER = "agus95-89"
GH_DISPATCH_REPO = "holland-daily"

# Cron triggers (UTC). GitHub Actions schedule is best-effort and proved
# unreliable on this low-traffic repo (silently skipped 4/30 entirely),
# so we drive workflow_dispatch from Cloudflare Workers cron (±1 min SLA).
#
# Two-cron pairs (one for CEST, one for CET) cover both halves of the year
# with idempotency on the workflow side.
[triggers]
crons = [
  "0 6 * * *",     # Daily news — 8:00 NL CEST (summer)
  "0 7 * * *",     # Daily news — 8:00 NL CET (winter); already_ran_today() skips if summer cron ran
  "0 6 * * 4",     # Thursday — additionally fires weekly-column.yml in summer
  "0 7 * * 4",     # Thursday — same in winter
  "30 6 * * *",    # Daily report — 8:30 NL CEST (after the news pipeline finishes)
  "30 7 * * *",    # Daily report — 8:30 NL CET
  "0 7 1 * *",     # Monthly report — 9:00 NL CEST on day 1
  "0 8 1 * *",     # Monthly report — 9:00 NL CET on day 1
]

# Secret values (set via `wrangler secret put` or Cloudflare dashboard):
#   RESEND_API_KEY
#   RESEND_AUDIENCE_ID
#   GH_DISPATCH_TOKEN   (GitHub PAT with `workflow` scope)
