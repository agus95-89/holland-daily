sources:
  - name: NOS Algemeen
    url: https://feeds.nos.nl/nosnieuwsalgemeen
    enabled: true
  - name: Volkskrant
    url: https://www.volkskrant.nl/voorpagina/rss.xml
    enabled: true
  - name: NRC
    url: https://www.nrc.nl/rss/
    enabled: true
  - name: AD
    url: https://www.ad.nl/home/rss.xml
    enabled: true
  - name: Het Parool
    url: https://www.parool.nl/voorpagina/rss.xml
    enabled: true
  - name: Trouw
    url: https://www.trouw.nl/voorpagina/rss.xml
    enabled: true
  - name: NU.nl
    url: https://www.nu.nl/rss/Algemeen
    enabled: true
  - name: NL Times
    url: https://nltimes.nl/rss.xml
    enabled: true
  - name: DutchNews
    url: https://www.dutchnews.nl/feed/
    enabled: true
  - name: Rijksoverheid
    url: https://www.rijksoverheid.nl/documenten.rss
    enabled: false  # 2026-04-29: feed returns 404, disabled until a working URL is found

# Top selection: dedupe + source diversification
selection:
  per_source_cap: 8   # at the RSS-fetch stage, take at most N most-recent in-window items per source
  max_per_source: 3   # in the top-N selection, no more than N articles from one source
  candidate_pool: 30  # consider top-N by importance, then dedupe + diversify down to max_articles

categories:
  - 政治・政策
  - 経済・ビジネス
  - 社会・事件
  - EU・国際関係
  - テック・スタートアップ
  - 生活・文化

schedule:
  target_hour_nl: 8
  timezone: Europe/Amsterdam
  max_articles: 10
  candidate_pool_cap: 60   # raised so per-source cap fills the pool with a mix of all sources
  window_hours: 26

claude:
  model: claude-sonnet-4-6
  max_body_chars: 8000

tts:
  # Gemini 2.5 Flash TTS Multi-Speaker (since 2026-05-02)
  announcer_voice: Kore        # Speaker 1 — 進行 + ニュース本文読み (女性)
  commentator_voice: Puck      # Speaker 2 — 補足のみ (男性)
  chunk_max_chars: 1500        # 1 リクエストの上限。大きいほど声の一貫性が増すが、長すぎると artifact 復活。1500 ≒ 3 分前後/chunk が安全圏 (bitrate 128k と併用)
  inter_chunk_silence_ms: 700  # chunk 間の無音 (掛け合いの間として機能)
  bitrate: "128k"              # MP3 圧縮ビットレート (64k だと artifact が目立つ)

podcast:
  show_name: HARRO LIFE
  show_subtitle: オランダのニュースを、日本語の音声でお届けします。
