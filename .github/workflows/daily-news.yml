name: Holland Daily Podcast

on:
  # Legacy repo is frozen after migration to HARROJP/HARRO_LIFE.
  # Keep manual dispatch only for rollback; scheduled/Worker-driven runs
  # must not generate duplicate podcast episodes or emails.
  workflow_dispatch:
    inputs:
      allow_legacy_run:
        description: 'Emergency rollback only: actually run this legacy workflow'
        type: boolean
        default: false
      force_run:
        description: 'Skip local-hour guard and run now'
        type: boolean
        default: true

permissions:
  contents: write

concurrency:
  group: holland-daily
  cancel-in-progress: false

jobs:
  run:
    if: ${{ github.event.inputs.allow_legacy_run == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout (netherlands-news-bot)
        uses: actions/checkout@v4

      - name: Clone harro-life-site (for cross-repo article commits)
        env:
          HARRO_LIFE_SITE_PAT: ${{ secrets.HARRO_LIFE_SITE_PAT }}
        run: |
          if [ -z "$HARRO_LIFE_SITE_PAT" ]; then
            echo "HARRO_LIFE_SITE_PAT not set, skipping cross-repo clone"
          else
            git clone "https://x-access-token:${HARRO_LIFE_SITE_PAT}@github.com/agus95-89/harro-life-site.git" "$GITHUB_WORKSPACE/harro-life-site"
          fi

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install ffmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Holland Daily pipeline
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          UNSPLASH_ACCESS_KEY: ${{ secrets.UNSPLASH_ACCESS_KEY }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          RESEND_AUDIENCE_ID: ${{ vars.RESEND_AUDIENCE_ID }}
          EMAIL_FROM: ${{ vars.EMAIL_FROM }}
          EMAIL_TO: ${{ vars.EMAIL_TO }}
          PODCAST_BASE_URL: ${{ vars.PODCAST_BASE_URL }}
          MARKDOWN_OUTPUT_DIR: ${{ github.workspace }}/harro-life-site/src/content/news
          FORCE_RUN: ${{ github.event_name == 'workflow_dispatch' && inputs.force_run && '1' || '' }}
        run: python -m src.main

      - name: Commit episode and feed (this repo)
        run: |
          git config user.name "holland-daily-bot"
          git config user.email "holland-daily-bot@users.noreply.github.com"
          git add docs/
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: daily episode $(TZ=Europe/Amsterdam date +%Y-%m-%d)"
            # Pull-rebase first in case origin/main moved during the long run.
            # Retry push a few times to absorb concurrent pushes.
            for attempt in 1 2 3; do
              git pull --rebase origin main && git push && break
              echo "push attempt $attempt failed, retrying..."
              sleep 5
            done
          fi

      - name: Commit articles to harro-life-site (cross-repo)
        env:
          HARRO_LIFE_SITE_PAT: ${{ secrets.HARRO_LIFE_SITE_PAT }}
        run: |
          if [ -z "$HARRO_LIFE_SITE_PAT" ]; then
            echo "HARRO_LIFE_SITE_PAT not set, skipping cross-repo commit"
            exit 0
          fi
          if [ ! -d "$GITHUB_WORKSPACE/harro-life-site" ]; then
            echo "harro-life-site not cloned, skipping cross-repo commit"
            exit 0
          fi
          cd "$GITHUB_WORKSPACE/harro-life-site"
          git config user.name "harro-life-bot"
          git config user.email "harro-life-bot@users.noreply.github.com"
          git add src/content/news/
          if git diff --cached --quiet; then
            echo "No new articles to commit"
          else
            git commit -m "chore: daily news articles $(TZ=Europe/Amsterdam date +%Y-%m-%d)"
            # Pull-rebase first in case origin/main moved during the long run
            # (e.g. site copy edits landing while the pipeline was generating
            # articles). Retry push a few times to absorb concurrent pushes.
            for attempt in 1 2 3; do
              git pull --rebase origin main && git push && break
              echo "push attempt $attempt failed, retrying..."
              sleep 5
            done
          fi
