name: Holland Daily Podcast

on:
  schedule:
    # GitHub Actions cron is UTC only (no DST).
    # Fire at both 07:00 and 08:00 UTC; Python guards for local 09:00 Europe/Amsterdam.
    - cron: '0 7 * * *'
    - cron: '0 8 * * *'
  workflow_dispatch:
    inputs:
      force_run:
        description: 'Skip local-hour guard and run now'
        type: boolean
        default: true

permissions:
  contents: write

concurrency:
  group: holland-daily
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install ffmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Write GCP credentials
        env:
          GCP_SA_JSON: ${{ secrets.GCP_SA_JSON }}
        run: |
          printf '%s' "$GCP_SA_JSON" > "$HOME/gcp-sa.json"
          echo "GOOGLE_APPLICATION_CREDENTIALS=$HOME/gcp-sa.json" >> "$GITHUB_ENV"

      - name: Run Holland Daily pipeline
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          PODCAST_BASE_URL: ${{ vars.PODCAST_BASE_URL }}
          FORCE_RUN: ${{ github.event_name == 'workflow_dispatch' && inputs.force_run && '1' || '' }}
        run: python -m src.main

      - name: Commit episode and feed
        run: |
          git config user.name "holland-daily-bot"
          git config user.email "holland-daily-bot@users.noreply.github.com"
          git add docs/
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: daily episode $(TZ=Europe/Amsterdam date +%Y-%m-%d)"
            git push
          fi
