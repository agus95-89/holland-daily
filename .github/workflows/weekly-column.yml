name: HARRO LIFE Weekly Column

on:
  schedule:
    # Every Thursday — fire across an 8-12 UTC window so we always land
    # somewhere inside Europe/Amsterdam business hours regardless of GitHub
    # Actions schedule delays. Idempotent: a week's column is generated only
    # once (filename includes ISO week, second run sees existing file and exits).
    - cron: '0 8 * * 4'
    - cron: '0 9 * * 4'
    - cron: '0 10 * * 4'
    - cron: '0 11 * * 4'
    - cron: '0 12 * * 4'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: weekly-column
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout (netherlands-news-bot)
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run column generator (writes to pending-columns/, sends review email)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          UNSPLASH_ACCESS_KEY: ${{ secrets.UNSPLASH_ACCESS_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          EMAIL_FROM: ${{ vars.EMAIL_FROM }}
          REVIEW_TO: ${{ vars.REVIEW_TO }}
          REVIEW_CC: ${{ vars.REVIEW_CC }}
          COLUMN_PENDING_DIR: ${{ github.workspace }}/pending-columns
        run: python -m src.column_generator

      - name: Commit pending column to netherlands-news-bot
        run: |
          git config user.name "harro-life-bot"
          git config user.email "harro-life-bot@users.noreply.github.com"
          git add pending-columns/
          if git diff --cached --quiet; then
            echo "No new pending column to commit (likely skipped because the week's column already exists)"
            exit 0
          fi
          git commit -m "chore: pending column $(TZ=Europe/Amsterdam date +%Y-W%V)"
          for attempt in 1 2 3; do
            git pull --rebase origin main && git push && break
            echo "push attempt $attempt failed, retrying..."
            sleep 5
          done
